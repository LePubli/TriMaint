name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: trimaint_test
          POSTGRES_USER: trimaint
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (flake8)
        working-directory: backend
        run: flake8 app tests

      - name: Format check (black)
        working-directory: backend
        run: black --check app tests

      - name: Security scan (bandit)
        working-directory: backend
        run: bandit -r app -ll -x app/alembic

      - name: Tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://trimaint:test_pass@localhost:5432/trimaint_test
          SECRET_KEY: ci-test-secret-key-not-for-production-use-only-64chars
          TEST_MODE: "1"
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=40

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Tests
        working-directory: frontend
        run: npm test -- --coverage --reporter=verbose
